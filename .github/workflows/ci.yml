name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python files
        run: python -m compileall src scripts tests

      - name: Run Phase 1 acceptance gate
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q tests/acceptance

      - name: Run Phase 2 runtime acceptance gate
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q tests/acceptance/runtime

      - name: Run tests
        run: python -m pytest

      - name: Run Ruff lint
        run: python -m ruff check .

      - name: Check Ruff formatting
        run: python -m ruff format --check .

  validate-jax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JAX test package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test-jax]"

      - name: Run JAX learning tests
        run: python -m pytest -q -m jax

      - name: Run JAX acceptance gate
        run: python -m pytest -q tests/test_p3_5_forward_surface_contract.py
